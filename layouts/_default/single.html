{{ define "main" }}
  <article class="article">
    <a class="back-link" href="{{ "/blog/" | relURL }}">Назад в блог</a>
    <header>
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "02.01.2006" }}</time>
      <h1>{{ .Title }}</h1>
      <p>{{ .Description }}</p>
    </header>
    <div class="article-body">
      {{ .Content }}
    </div>
    <div class="article-cta">
      <h2>Хотите перейти от чтения к первому слоту?</h2>
      <a class="btn btn-primary" href="{{ .Site.Params.referral_url }}" target="_blank" rel="noopener nofollow sponsored">Заполнить заявку</a>
    </div>
  </article>
{{ end }}
