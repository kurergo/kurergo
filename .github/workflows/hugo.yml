name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.162.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6
        with:
          enablement: true
      - name: Install Hugo
        run: |
          wget -O "$RUNNER_TEMP/hugo.deb" "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i "$RUNNER_TEMP/hugo.deb"
      - name: Build
        run: hugo --gc --minify --cleanDestinationDir
      - name: Disable Jekyll
        run: touch public/.nojekyll
      - name: Clean generated artifact
        run: |
          find public \( -name ".DS_Store" -o -name "._*" -o -name "Thumbs.db" \) -delete
          find public -type l -print -delete
      - name: Validate Pages artifact
        run: |
          test -f public/index.html
          test -f public/.nojekyll
          echo "Artifact size:"
          du -sh public
          echo "File count:"
          find public -type f | wc -l
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public
          retention-days: 1
  deploy:
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
        with:
          timeout: 900000
          error_count: 60
          reporting_interval: 15000
