baseURL = "https://kurergo.ru/"
locale = "ru-RU"
title = "KurerGO"
defaultContentLanguage = "ru"
enableRobotsTXT = true
enableGitInfo = false
summaryLength = 22

[pagination]
  pagerSize = 20

[permalinks]
  landing = "/:slug/"

[frontmatter]
  date = ["date", "publishDate", "lastmod"]
  lastmod = ["lastmod", ":git", "date", "publishDate"]
  publishDate = ["publishDate", "date"]
  expiryDate = ["expiryDate"]

[params]
  description = "KurerGO — справочный ресурс о работе и подработке курьером: форматы доставки, ориентировочный доход, города, WIKI и регистрация онлайн."
  referral_url = "https://reg.eda.yandex.ru/?advertisement_campaign=forms_for_agents&user_invite_code=569fd35d6ccc4111852a73036a77109f&utm_content=blank"
  phone = ""
  city = "Россия"
  yandexMetrika = ""

[menu]
  [[menu.main]]
    name = "Доход"
    url = "/#income-calculator"
    weight = 10
  [[menu.main]]
    name = "Форматы"
    url = "/#formats"
    weight = 20
  [[menu.main]]
    name = "Найдите свой город"
    url = "/#cities"
    weight = 30
  [[menu.main]]
    name = "WIKI"
    url = "/blog/"
    weight = 40
  [[menu.main]]
    name = "Вопросы"
    url = "/#faq"
    weight = 50

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[services]
  [services.rss]
    limit = -1
