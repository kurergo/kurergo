  hero_badges:
    - "Будни или выходные"
    - "Можно без опыта"
    - "Пешком, вело или авто"
  audience:
    - title: "Тем, кому нужен дополнительный доход"
      text: "Можно выходить тогда, когда есть свободное время."
    - title: "Новичкам"
      text: "Опыт работы курьером не обязателен."
    - title: "Студентам и занятым в будни"
      text: "Формат можно совмещать с учебой или основной работой."
  benefits:
    - title: "Гибкий старт"
      text: "Регистрация проходит онлайн, без долгих собеседований."
    - title: "Разные форматы"
      text: "Можно доставлять пешком, на велосипеде или автомобиле."
    - title: "Ориентир по доходу"
      text: "Калькулятор помогает заранее оценить возможный сценарий."
    - title: "Подходит для свободных дней"
      text: "Можно рассматривать как вечернюю или выходную подработку."
    - title: "Без привязки к офису"
      text: "Работа проходит в городе и районах доставки."
    - title: "Чаевые остаются курьеру"
      text: "Дополнительные начисления зависят от заказов и клиентов."
  formats:
    - title: "Пешком"
      text: "Для старта без транспорта."
    - title: "На велосипеде"
      text: "Для более активного темпа."
    - title: "На авто"
      text: "Для владельцев автомобиля."
  faq:
    - question: "Можно ли использовать работу курьером именно как подработку?"
      answer: "Да, формат часто выбирают для дополнительного дохода. Доступность слотов и заказов зависит от города и спроса."
    - question: "Нужен ли опыт?"
      answer: "Во многих городах можно начать без опыта. Точные условия показываются при регистрации."
    - question: "Можно ли выходить не каждый день?"
      answer: "Обычно график гибкий, но доступность удобного времени зависит от города и текущей загрузки."
