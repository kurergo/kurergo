steps:
  - title: "Нажмите кнопку регистрации"
    text: "Перейдите к анкете и выберите город."
  - title: "Укажите формат"
    text: "Пешком, на велосипеде или на автомобиле."
  - title: "Проверьте условия"
    text: "Требования, выплаты и доступность зависят от города."
  - title: "Начните доставлять"
    text: "Выбирайте удобные дни и время на линии."
